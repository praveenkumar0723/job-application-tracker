<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Add Job</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/jobs/save}"
                  th:object="${job}"
                  method="post"
                  enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">

                    <label class="form-label">Company Name</label>

                    <input type="text"
                           th:field="*{company}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('company')}"
                         th:errors="*{company}">
                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Job Title</label>

                    <input type="text"
                           th:field="*{jobTitle}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('jobTitle')}"
                         th:errors="*{jobTitle}">
                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Location</label>

                    <input type="text"
                           th:field="*{location}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('location')}"
                         th:errors="*{location}">
                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Status</label>

                    <select th:field="*{status}" class="form-select">

                        <option value="">Select Status</option>
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Selected">Selected</option>
                        <option value="Rejected">Rejected</option>

                    </select>

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('status')}"
                         th:errors="*{status}">
                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Resume (PDF / DOC / DOCX)
                    </label>

                    <input type="file"
                           name="resume"
                           class="form-control"
                           accept=".pdf,.doc,.docx">

                </div>

                <button type="submit" class="btn btn-success">
                    Save Job
                </button>

                <a th:href="@{/jobs}" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
